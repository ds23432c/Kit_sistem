{% extends 'base.html' %}
{% block page_title %}Добавить кабинет{% endblock %}
{% block content %}
<div style="max-width:500px">
  <a href="{% url 'floor_list' %}" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-secondary);margin-bottom:24px;font-size:14px">
    <i data-lucide="arrow-left" width="16" height="16"></i> Вернуться
  </a>

  <div class="card">
    <h2 style="margin-bottom:20px">Создать новый кабинет</h2>
    <div style="margin-bottom:20px;padding:12px;background:var(--bg);border-radius:8px;font-size:13px">
      <div class="text-secondary">Здание:</div>
      <div style="font-weight:500;margin-top:4px">{{ floor.building.name }}</div>
      <div class="text-secondary" style="margin-top:12px">Этаж:</div>
      <div style="font-weight:500;margin-top:4px">{{ floor.number }}{% if floor.name %} — {{ floor.name }}{% endif %}</div>
    </div>

    <form method="POST">
      {% csrf_token %}
      
      <div class="form-group">
        <label class="form-label">Номер кабинета *</label>
        <input type="text" name="number" class="form-input" placeholder="Например: 101, 102, 103" required>
      </div>

      <div class="form-group">
        <label class="form-label">Название кабинета *</label>
        <input type="text" name="name" class="form-input" placeholder="Например: Компьютерный класс №1" required>
      </div>

      <div style="display:flex;gap:12px;margin-top:28px">
        <button type="submit" class="btn btn-primary"><i data-lucide="plus" width="16" height="16"></i> Создать кабинет</button>
        <a href="{% url 'floor_list' %}" class="btn btn-ghost">Отмена</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
