{% extends 'base.html' %}
{% block page_title %}Лог изменений{% endblock %}
{% block content %}
<div class="table-card">
  <table><thead><tr><th>Действие</th><th>Пользователь</th><th>Модель</th><th>Дата</th></tr></thead>
  <tbody>{% for log in logs %}
  <tr><td>{{ log.action }}</td><td>{{ log.user|default:"—" }}</td><td><span class="badge badge-gray">{{ log.model_name }}</span></td><td class="text-secondary">{{ log.created_at|date:"d.m.Y H:i" }}</td></tr>
  {% empty %}<tr><td colspan="4" style="text-align:center;padding:32px;color:var(--text-secondary)">Лог пуст</td></tr>{% endfor %}
  </tbody></table>
</div>
{% endblock %}
