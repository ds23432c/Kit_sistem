{% extends 'base.html' %}
{% block page_title %}Добавить здание{% endblock %}
{% block content %}
<div style="max-width:500px">
  <a href="{% url 'floor_list' %}" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-secondary);margin-bottom:24px;font-size:14px">
    <i data-lucide="arrow-left" width="16" height="16"></i> Вернуться
  </a>

  <div class="card">
    <h2 style="margin-bottom:20px">Создать новое здание</h2>
    <form method="POST">
      {% csrf_token %}
      
      <div class="form-group">
        <label class="form-label">Название здания *</label>
        <input type="text" name="name" class="form-input" placeholder="Например: Главный корпус, Корпус А" required>
      </div>

      <div class="form-group">
        <label class="form-label">Адрес (опционально)</label>
        <input type="text" name="address" class="form-input" placeholder="Например: ул. Лесная, д. 15">
      </div>

      <div style="display:flex;gap:12px;margin-top:28px">
        <button type="submit" class="btn btn-primary"><i data-lucide="plus" width="16" height="16"></i> Создать здание</button>
        <a href="{% url 'floor_list' %}" class="btn btn-ghost">Отмена</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
