{% extends 'base.html' %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="card" style="max-width:720px">
  <form method="post" enctype="multipart/form-data">{% csrf_token %}
    <div class="form-grid">
      {% for field in form %}
      <div class="form-group {% if field.field.widget.attrs.rows %}{% endif %}" {% if field.name == 'specs' %}style="grid-column:1/-1"{% endif %}>
        <label class="form-label">{{ field.label }}{% if field.field.required %} *{% endif %}</label>
        {{ field }}
        {% if field.errors %}<div style="color:var(--red);font-size:12px;margin-top:4px">{{ field.errors.0 }}</div>{% endif %}
      </div>
      {% endfor %}
    </div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button type="submit" class="btn btn-primary">Сохранить</button>
      <a href="{% url 'equipment_list' %}" class="btn btn-secondary">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
